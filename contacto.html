<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Café - Contáctanos</title>
    <!-- Fuente Retro de Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --cafe-oscuro: #4a2c1d;
            --cafe-medio: #6b3e26;
            --cafe-claro: #8b5a3c;
            --beige: #f5f5dc;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #fcf8f5;
            color: #333;
        }

        /* Header y Navegación */
        header {
            background-color: var(--cafe-oscuro);
            color: var(--blanco);
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        nav {
            background-color: var(--cafe-medio);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: var(--blanco);
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #dcb28a;
        }

        /* Sección de Contacto */
        .contact-section {
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('cafeteria.jpg');
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--cafe-oscuro);
            margin-bottom: 10px;
        }

        /* Formulario */
        .container-form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--cafe-oscuro);
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box; /* Evita que el padding ensanche el input */
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--cafe-claro);
            box-shadow: 0 0 5px rgba(139, 90, 60, 0.3);
        }

        input[type="submit"] {
            background-color: var(--cafe-oscuro);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: var(--cafe-claro);
        }

        /* Footer */
        footer {
            background-color: var(--cafe-oscuro);
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 40px;
        }

        footer p { margin: 5px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <img src="café.jpg" style="width: 80px; border-radius: 50%;" alt="Logo Retro Café" />
        <h1>Retro Café</h1>
        <p>El mejor café de la ciudad</p>
    </header>

    <nav>
        <a href="index.html">INICIO</a>
        <a href="nosotros.html">NOSOTROS</a>
        <a href="carta.html">CARTA</a>
        <a href="galeriía.html">GALERÍA</a>
        <a href="#" style="color: #dcb28a;">CONTACTO</a>
        <a href="pedironline.html">PEDIDO ONLINE</a>
    </nav>

    <section class="contact-section">
        <h2>¡Contáctanos!</h2>
        <p style="margin-bottom: 30px; text-align: center;">¿Tienes alguna pregunta? ¡Nos encantaría saber de ti!</p>
        
        <div class="container-form">
            <form action="enviar_contacto.php" method="post">
                <div class="form-group">
                    <label for="nombre">Nombre y Apellido</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>
                </div>

                <input type="submit" value="Enviar Mensaje">
            </form>
        </div>
    </section>

    <footer>
        <p>📍 Lima, Perú | 📞 Tel: 996527160</p>
        <p>&copy; 2026 Retro Café. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
