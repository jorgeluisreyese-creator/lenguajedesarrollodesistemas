
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Café - Contáctanos</title>
    <!-- Fuente Retro de Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --cafe-oscuro: #4a2c1d;
            --cafe-medio: #6b3e26;
            --cafe-claro: #8b5a3c;
            --beige: #f5f5dc;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #fcf8f5;
            color: #333;
        }

        /* Header con Flexbox */
        header {
            background-color: var(--cafe-oscuro);
            color: white;
            padding: 20px 5%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-bottom: 4px solid var(--dorado);
        }

        header img {
            border-radius: 50%;
            background: white;
            padding: 5px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin: 0;
        }

        nav {
            background-color: var(--cafe-medio);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: var(--blanco);
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #dcb28a;
        }

        /* Sección de Contacto */
        .contact-section {
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('cafeteria.jpg');
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--cafe-oscuro);
            margin-bottom: 10px;
        }

        /* Formulario */
        .container-form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--cafe-oscuro);
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box; /* Evita que el padding ensanche el input */
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--cafe-claro);
            box-shadow: 0 0 5px rgba(139, 90, 60, 0.3);
        }

        input[type="submit"] {
            background-color: var(--cafe-oscuro);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: var(--cafe-claro);
        }

        /* Footer */
        footer {
            background-color: var(--cafe-oscuro);
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 40px;
        }

        footer p { margin: 5px 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <section id="contacto">

    <h2>Contáctanos</h2>
     <div class="container-form">
    <form id="formContacto">
        <label for="nombre">Nombre y Apellido</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>
         <label for="email">Correo Electrónico</label>
        <input type="email" id="correo" placeholder="Tu correo" required>
         <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" placeholder="Escribe tu mensaje" required></textarea>
        <button type="submit">Enviar</button>
    </form>
     </div>
    <p id="respuesta"></p>

</section>

<style>
#contacto {
    max-width: 400px;
    margin: 50px auto;
    text-align: center;
}

#contacto input,
#contacto textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

#contacto button {
    padding: 10px 20px;
    background: #6b4f4f;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#contacto button:hover {
    background: #4a3434;
}
</style>

<script>
document.getElementById("formContacto").addEventListener("submit", function(e) {
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;

    document.getElementById("respuesta").innerHTML =
        "Gracias " + nombre + ", tu mensaje fue enviado ✅";
});
</script>
</body>
</html>
